name: Build, Format, Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci

      - name: Format check
        run: npx prettier --check .

      - name: Lint
        run: npx oxlint@latest --quiet

      - name: Build & test
        run: npm test
